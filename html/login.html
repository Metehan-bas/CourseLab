<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CourseLab</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body>
    <div class="bg-white dark:bg-gray-900">
      <div class="flex h-screen">
        <div
          class="hidden lg:flex lg:w-2/3 h-full bg-cover bg-center"
          style="
            background-image: url(&quot;https://images.unsplash.com/photo-1616763355603-9755a640a287&quot;);
          "
        >
          <div class="flex items-center h-full px-20 bg-black/40">
            <div>
              <h2 class="text-3xl font-bold text-white">CourseLab</h2>
              <p class="max-w-xl mt-3 text-gray-200">
                Modern online learning platform.
              </p>
            </div>
          </div>
        </div>
        <div
          class="flex items-center justify-center w-full lg:w-1/3 px-6 flex-col"
        >
          <div class="container flex justify-center items-center">
            <a href="./home.html">
              <img
                src="../img/Course_Lab-removebg-preview.png"
                class="h-60 w-60"
              />
            </a>
          </div>
          <div class="w-full max-w-md">
            <div class="text-center">
              <p class="mt-3 text-gray-500">Sign in to access your account</p>
            </div>

            <div class="mt-8">
              <form>
                <div>
                  <label class="block mb-2 text-sm text-white">
                    Email Address
                  </label>
                  <input
                    type="email"
                    class="w-full px-4 py-2 border border-white rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 text-white"
                  />
                </div>

                <div class="mt-6">
                  <label class="block mb-2 text-sm text-white">
                    Password
                  </label>
                  <input
                    type="password"
                    class="w-full px-4 py-2 border border-white rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 text-white"
                  />
                </div>

                <div class="mt-6">
                  <button
                    class="w-full px-4 py-2 text-white bg-blue-500 rounded-lg hover:bg-blue-600 transition"
                  >
                    Sign in
                  </button>
                </div>
              </form>

              <p class="mt-6 text-sm text-center text-gray-400">
                Don’t have an account?
                <a href="../html/register.html" class="text-blue-500 hover:underline"> Sign up </a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
      <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1"></script>
  <script>
  const btn = document.getElementById("menuBtn");
  const menu = document.getElementById("mobileMenu");
  btn.onclick = () => menu.classList.toggle("hidden");
  </script>
  </body>
</html>

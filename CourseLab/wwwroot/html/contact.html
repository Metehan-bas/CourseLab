<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - CourseLab</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900">
    <header class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800">
        <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
            <div class="flex h-16 items-center justify-between">
                <div class="flex items-center">
                    <a href="/">
                        <img src="/img/Course_Lab-removebg-preview.png"
                             class="h-20 w-20" />
                    </a>

                    <nav class="hidden md:flex items-center gap-8 text-sm font-semibold text-gray-700 dark:text-gray-200">
                        <a href="#" class="hover:text-indigo-600">Courses</a>
                        <a href="/html/contact.html" class="hover:text-indigo-600">Contact</a>

                        <a href="/Instructor/Apply"
                           class="ml-2 bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">
                            Become an Instructor
                        </a>
                    </nav>
                </div>

                <div class="flex items-center gap-3">
                    <a href="/Account/Login"
                       class="text-sm font-semibold text-gray-700 dark:text-white hover:text-indigo-600">
                        Login
                    </a>

                    <a href="/Student/Register"
                       class="bg-gray-900 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-black dark:bg-white dark:text-black hover:text-white">
                        Register
                    </a>

                    <button id="menuBtn" class="md:hidden p-2 text-white">
                        <svg class="size-6"
                             fill="none"
                             stroke="currentColor"
                             stroke-width="2"
                             viewBox="0 0 24 24">
                            <path stroke-linecap="round"
                                  stroke-linejoin="round"
                                  d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div id="mobileMenu"
             class="hidden md:hidden bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800">
            <div class="px-4 py-4 flex flex-col gap-4 text-sm font-semibold text-gray-700 dark:text-white">
                <a href="#" class="hover:text-indigo-600">Courses</a>
                <a href="/html/contact.html" class="hover:text-indigo-600">Contact</a>

                <a href="/Instructor/Apply"
                   class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-center">
                    Become an Instructor
                </a>
            </div>
        </div>
    </header>

    <section class="text-gray-300 body-font relative">
        <div class="container px-5 py-24 mx-auto flex sm:flex-nowrap flex-wrap">

            <div class="hidden sm:block lg:w-2/3 md:w-1/2 bg-gray-800 rounded-lg overflow-hidden sm:mr-10 relative min-h-[500px]">
                <iframe width="100%" height="100%" class="absolute inset-0"
                        frameborder="0"
                        title="map"
                        scrolling="no"
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3009.5248887234397!2d28.91463107644496!3d41.03564931773839!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14caba6589364c13%3A0x2d4f98b61ba1e665!2s%C4%B0stanbul%20Ticaret%20Odas%C4%B1%20Mesleki%20Ve%20Teknik%20Anadolu%20Lisesi!5e0!3m2!1str!2str!4v1771532666453!5m2!1str!2str">
                </iframe>

                <div class="bg-gray-900 relative flex flex-wrap py-6 rounded shadow-md w-full hidden sm:block">
                    <div class="lg:w-1/2 px-6">
                        <h2 class="font-semibold text-white tracking-widest text-xs">ADDRESS</h2>
                        <p class="mt-1 text-gray-400">Yenidoğan, Çevreyolu Cd. No:16, 34030 Bayrampaşa/İstanbul</p>
                    </div>
                    <div class="lg:w-1/2 px-6 mt-4 lg:mt-0">
                        <h2 class="font-semibold text-white tracking-widest text-xs">EMAIL</h2>
                        <p class="text-blue-400">contact@courselab.com</p>
                        <h2 class="font-semibold text-white tracking-widest text-xs mt-4">PHONE</h2>
                        <p class="text-gray-400">+90 555 555 55 55</p>
                    </div>
                </div>
            </div>

            <div class="lg:w-1/3 md:w-1/2 bg-gray-800 flex flex-col md:ml-auto w-full md:py-8 mt-8 md:mt-0 p-8 rounded-lg">
                <h2 class="text-white text-lg mb-1 font-medium">Contact Us</h2>
                <p class="mb-5 text-gray-400">Send us a message and we’ll get back to you.</p>

                <div class="relative mb-4">
                    <label class="text-sm text-gray-400">Name</label>
                    <input type="text"
                           class="w-full bg-transparent rounded border border-gray-600 focus:border-blue-500 focus:ring-2 focus:ring-blue-400 text-white py-2 px-3 outline-none transition">
                </div>

                <div class="relative mb-4">
                    <label class="text-sm text-gray-400">Email</label>
                    <input type="email"
                           class="w-full bg-transparent rounded border border-gray-600 focus:border-blue-500 focus:ring-2 focus:ring-blue-400 text-white py-2 px-3 outline-none transition">
                </div>

                <div class="relative mb-4">
                    <label class="text-sm text-gray-400">Message</label>
                    <textarea class="w-full bg-transparent rounded border border-gray-600 focus:border-blue-500 focus:ring-2 focus:ring-blue-400 h-32 text-white py-2 px-3 outline-none resize-none transition"></textarea>
                </div>

                <button class="text-white bg-blue-500 py-2 px-6 hover:bg-blue-600 rounded-lg transition">
                    Send Message
                </button>

            </div>
        </div>
    </section>
    <script>
        const btn = document.getElementById("menuBtn");
        const menu = document.getElementById("mobileMenu");
        btn.onclick = () => menu.classList.toggle("hidden");
    </script>
</body>
</html>
